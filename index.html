<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Hospitalario - Especialidades</title>
    <!-- Bootstrap CSS (desde la nube) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Barra de Navegación -->
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🏥 ERP Hospitalario - Módulo Especialidades</span>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h3>Directorio de Especialidades</h3>
                <p class="text-muted">Consumiendo datos directamente desde Render</p>
            </div>
            <div class="col-md-4 text-end">
                <!-- Botón que activará la búsqueda -->
                <button id="btnCargarDatos" class="btn btn-success btn-lg">Actualizar Datos</button>
            </div>
        </div>

        <!-- Tabla -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        <tr>
                            <td colspan="3" class="text-center text-muted">Haz clic en "Actualizar Datos" para cargar la información.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Tu archivo de JavaScript -->
    <script src="app.js"></script>
</body>
</html>
